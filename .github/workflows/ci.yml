name: CI

on:
  push:
    branches: ['master']
  pull_request:
    branches: ['master']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore and build auth-api
        working-directory: ./auth-api
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Restore and build resource-api
        working-directory: ./resource-api
        run: |
          dotnet restore
          dotnet build --configuration Release --no-restore

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install and build web-app
        working-directory: ./web-app
        run: |
          npm install
          npm run build

